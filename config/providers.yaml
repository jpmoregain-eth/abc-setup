# AI Model Providers Configuration
# Add or modify providers here - no code changes needed

anthropic:
  name: Anthropic
  description: Claude models - Best for coding and analysis
  endpoint: https://api.anthropic.com/v1/messages
  api_key_prefix: sk-ant-
  docs_url: https://console.anthropic.com
  models:
    - id: claude-sonnet-4-6
      name: Claude Sonnet 4.6
      context: 200K
      recommended: true
    - id: claude-opus-4
      name: Claude Opus 4
      context: 200K

openai:
  name: OpenAI
  description: GPT models - General purpose
  endpoint: https://api.openai.com/v1/chat/completions
  api_key_prefix: sk-
  docs_url: https://platform.openai.com
  models:
    - id: gpt-4o
      name: GPT-4o
      context: 128K
      recommended: true
    - id: gpt-4o-mini
      name: GPT-4o Mini
      context: 128K

google:
  name: Google Gemini
  description: Long context, multimodal
  endpoint: https://generativelanguage.googleapis.com/v1beta
  api_key_prefix: ""
  docs_url: https://ai.google.dev
  models:
    - id: gemini-1.5-pro
      name: Gemini 1.5 Pro
      context: 2M
    - id: gemini-1.5-flash
      name: Gemini 1.5 Flash
      context: 1M
      recommended: true

mistral:
  name: Mistral AI
  description: European AI, great for coding
  endpoint: https://api.mistral.ai/v1/chat/completions
  api_key_prefix: ""
  docs_url: https://docs.mistral.ai
  models:
    - id: mistral-large-latest
      name: Mistral Large
      context: 128K
    - id: codestral-latest
      name: Codestral
      context: 32K
      recommended: true

groq:
  name: Groq
  description: Ultra-fast inference
  endpoint: https://api.groq.com/openai/v1/chat/completions
  api_key_prefix: gsk_
  docs_url: https://console.groq.com
  models:
    - id: llama-3.3-70b-versatile
      name: Llama 3.3 70B
      context: 128K
      recommended: true
    - id: llama-3.1-8b-instant
      name: Llama 3.1 8B
      context: 128K

together:
  name: Together AI
  description: Access to many open-source models
  endpoint: https://api.together.xyz/v1/chat/completions
  api_key_prefix: ""
  docs_url: https://docs.together.ai
  models:
    - id: meta-llama/Llama-3.3-70B-Instruct-Turbo
      name: Llama 3.3 70B
      context: 128K
      recommended: true
    - id: deepseek-ai/DeepSeek-V3
      name: DeepSeek V3
      context: 64K

custom:
  name: Custom / Local
  description: OpenAI-compatible endpoint (Ollama, LocalAI, etc.)
  endpoint: http://localhost:11434/v1/chat/completions
  api_key_prefix: optional
  docs_url: ""
  models:
    - id: llama2
      name: Llama 2 (example)
    - id: custom-model
      name: Custom Model