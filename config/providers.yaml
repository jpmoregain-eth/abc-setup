# AI Model Providers Configuration
# Curated list: 4 best American + 4 best Chinese cloud models

# 🇺🇸 AMERICAN MODELS

anthropic:
  name: Anthropic (USA)
  description: Claude models - Best for coding and reasoning
  endpoint: https://api.anthropic.com/v1/messages
  api_key_prefix: sk-ant-
  docs_url: https://console.anthropic.com
  region: US
  models:
    - id: claude-sonnet-4-6
      name: Claude Sonnet 4.6
      context: 200K
      recommended: true
      description: Best balance of speed and intelligence

openai:
  name: OpenAI (USA)
  description: GPT-4o - General purpose powerhouse
  endpoint: https://api.openai.com/v1/chat/completions
  api_key_prefix: sk-
  docs_url: https://platform.openai.com
  region: US
  models:
    - id: gpt-4o
      name: GPT-4o
      context: 128K
      recommended: true
      description: Best for general tasks and reasoning
    - id: gpt-4o-mini
      name: GPT-4o Mini
      context: 128K
      description: Fast and cost-effective

google:
  name: Google Gemini (USA)
  description: Ultra-long context, multimodal
  endpoint: https://generativelanguage.googleapis.com/v1beta
  api_key_prefix: ""
  docs_url: https://ai.google.dev
  region: US
  models:
    - id: gemini-1.5-pro
      name: Gemini 1.5 Pro
      context: 2M
      recommended: true
      description: Massive 2M context window
    - id: gemini-1.5-flash
      name: Gemini 1.5 Flash
      context: 1M
      description: Fast with 1M context

xai:
  name: xAI (USA)
  description: Grok models - Real-time knowledge
  endpoint: https://api.x.ai/v1/chat/completions
  api_key_prefix: xai-
  docs_url: https://console.x.ai
  region: US
  models:
    - id: grok-2
      name: Grok 2
      context: 128K
      recommended: true
      description: Real-time X/Twitter knowledge

